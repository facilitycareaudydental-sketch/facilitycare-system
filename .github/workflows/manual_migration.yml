name: Manual DB Migration

on:
  workflow_dispatch:
    inputs:
      sql:
        description: 'SQL to execute'
        required: false
        default: 'SELECT 1'

jobs:
  run-migration:
    name: 🗄️ Run SQL Migration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Migration v4 via Node script (Direct API)
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: node create_tables.js
