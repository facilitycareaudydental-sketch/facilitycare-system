name: Deploy FM Operations

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '24'

jobs:
  # ============================================================
  # Validate — jalankan di setiap push & PR
  # ============================================================
  validate:
    name: ✅ Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install root deps (includes esbuild)
        run: npm install

      - name: Check required files
        run: |
          test -f api/src/index.js          && echo "✅ api/src/index.js"
          test -f api/wrangler.toml         && echo "✅ api/wrangler.toml"
          test -f frontend/src/app.js       && echo "✅ frontend/src/app.js"
          test -f frontend/public/index.html && echo "✅ frontend/public/index.html"
          test -f schema/migrations.sql     && echo "✅ schema/migrations.sql"
          test -f build-root.js             && echo "✅ build-root.js"

      - name: Test frontend build
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL || 'https://fm-operations-api.placeholder.workers.dev' }}
        run: node build-root.js

  # ============================================================
  # Deploy API ke Cloudflare Workers
  # ============================================================
  deploy-api:
    name: 🚀 Deploy API (Workers)
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install API deps
        run: npm install
        working-directory: api

      - name: Deploy Worker ke Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: api
          command: deploy

  # ============================================================
  # Deploy Frontend ke Cloudflare Pages
  # ============================================================
  deploy-pages:
    name: 🌐 Deploy Frontend (Pages)
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install root deps
        run: npm install

      - name: Build Frontend
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: node build-root.js

      - name: Deploy ke Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=facilitycare-system --commit-dirty=true

  # ============================================================
  # Migrasi Database D1
  # ============================================================
  migrate-db:
    name: 🗄️ Migrate D1 Database
    runs-on: ubuntu-latest
    needs: deploy-api
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Wrangler
        run: npm install -g wrangler@3

      - name: Run DB Migrations (remote D1)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler d1 execute fm-operations-db \
            --remote \
            --file=schema/migrations.sql \
            --yes
        continue-on-error: true

      - name: Run Schema v2 Migrations (ALTER TABLE — safe)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler d1 execute fm-operations-db \
            --remote \
            --file=schema/migration_v2.sql \
            --yes
        continue-on-error: true

      - name: Run Schema v3 Migrations (Performance Indexes — IF NOT EXISTS)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler d1 execute fm-operations-db \
            --remote \
            --file=schema/migration_v3_indexes.sql \
            --yes
        continue-on-error: true

      - name: Run Schema v4 Migrations (sp_data and mutasi_data — IF NOT EXISTS)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler d1 execute fm-operations-db \
            --remote \
            --file=schema/migration_v4_sp_mutasi.sql \
            --yes
        continue-on-error: true
