name = "fm-operations-api"
main = "src/index.js"
compatibility_date = "2024-10-22"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "fm-operations-db"
database_id = "9ba97b16-a1ad-4751-b948-d35eb1204a84"

[[kv_namespaces]]
binding = "SESSIONS"
id = "4acb3038c5b042b8ad3c87473d02a434"

[vars]
JWT_SECRET = "change-this-to-a-secure-random-string-in-production"
CORS_ORIGIN = "https://fm-operations.pages.dev"

[dev]
port = 8787
local_protocol = "http"
