<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="description" content="FM Operations - Facility Management System">
  <meta name="theme-color" content="#3b82f6">
  <title>FM Operations</title>

  <!-- PWA manifest -->
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/icon-192.png">

  <!-- Styles -->
  <link rel="stylesheet" href="/assets/style.css">

  <!-- API Config (injected at build/deploy time) -->
  <script>
    window.__FM_CONFIG = {
      API_BASE_URL: '__API_BASE_URL__'
    };
    // Fallback jika build tidak inject env variable
    if (window.__FM_CONFIG.API_BASE_URL === '__API_BASE_URL__') {
      window.__FM_CONFIG.API_BASE_URL = 'https://fm-operations-api.facilitycare-audydental.workers.dev';
    }
  </script>
</head>
<body>
  <div id="app">
    <!-- Initial loading state -->
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:1rem;">
      <div style="font-size:3rem">🏥</div>
      <div style="font-size:1.25rem;font-weight:700;color:#3b82f6">FM<strong>Ops</strong></div>
      <div class="spinner"></div>
    </div>
  </div>
  <div id="toast-container"></div>
  <!-- SheetJS for Excel Export/Import -->
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <script type="module" src="/assets/app.js"></script>
</body>
</html>
