<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Permintaan Barang & Chemical - FM Ops</title>
  <link rel="stylesheet" href="/assets/style.css">
  <style>
    .public-form-page { min-height: 100vh; background: var(--bg-secondary); display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }
    .public-form-card { background: var(--bg-primary); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); padding: 2rem; width: 100%; max-width: 680px; }
    .public-form-logo { text-align: center; margin-bottom: 1.5rem; }
    .public-form-logo h1 { font-size: 1.5rem; color: var(--primary); }
    .public-form-logo p { color: var(--text-muted); }
    .success-banner { background: var(--success-light); border: 1px solid var(--success); color: var(--success-dark); padding: 1.5rem; border-radius: var(--radius); text-align: center; }
  </style>
</head>
<body>
  <div class="public-form-page">
    <div class="public-form-card">
      <div class="public-form-logo">
        <div style="font-size:3rem">🏥</div>
        <h1>FM<strong>Ops</strong></h1>
        <p>Form Permintaan Barang &amp; Chemical</p>
      </div>

      <div id="form-container">
        <form id="supply-form" novalidate>
          <div class="form-group">
            <label class="form-label">Nama Pengirim</label>
            <input type="text" name="submitter_name" class="form-control" placeholder="Nama Anda" autocomplete="name">
          </div>

          <div class="form-group">
            <label class="form-label">Cabang <span class="required">*</span></label>
            <select name="branch_name_manual" class="form-control" id="branch-select" required>
              <option value="">-- Pilih Cabang --</option>
            </select>
          </div>

          <fieldset class="fieldset-section">
            <legend>Alat / Barang</legend>
            <div class="form-group">
              <label class="form-label">Nama Alat / Barang</label>
              <textarea name="tools_items_raw" class="form-control" rows="3" placeholder="Contoh: Mop set, Lap microfiber, Sapu (satu per baris)"></textarea>
            </div>
            <div class="form-group">
              <label class="form-label">Jumlah Permintaan Alat / Barang</label>
              <input type="text" name="tools_quantity" class="form-control" placeholder="Contoh: 2, 5 pcs, 1 set">
            </div>
          </fieldset>

          <fieldset class="fieldset-section">
            <legend>Chemical</legend>
            <div class="form-group">
              <label class="form-label">Nama Chemical</label>
              <textarea name="chemical_items_raw" class="form-control" rows="3" placeholder="Contoh: New Complete, Floor cleaner (satu per baris)"></textarea>
            </div>
            <div class="form-group">
              <label class="form-label">Jumlah Permintaan Chemical</label>
              <input type="text" name="chemical_quantity" class="form-control" placeholder="Contoh: 3 botol, 2 liter">
            </div>
          </fieldset>

          <div class="form-group">
            <label class="form-label">Catatan Tambahan</label>
            <textarea name="additional_notes" class="form-control" rows="3" placeholder="Keterangan tambahan jika ada..."></textarea>
          </div>

          <div id="form-error" class="alert alert-danger" style="display:none"></div>

          <button type="submit" class="btn btn-primary btn-full btn-lg" id="submit-btn">
            <span class="btn-text">📤 Kirim Permintaan</span>
            <span class="btn-spinner" style="display:none">⏳ Mengirim...</span>
          </button>

          <p style="margin-top:1rem;text-align:center">
            <a href="/" class="link-subtle">← Kembali ke Aplikasi</a>
          </p>
        </form>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script>
    const API = window.__FM_CONFIG?.API_BASE_URL || 'https://fm-operations-api.YOUR_SUBDOMAIN.workers.dev';

    // Load branches
    fetch(`${API}/api/branches?all=1`)
      .then(r => r.json())
      .then(data => {
        const sel = document.getElementById('branch-select');
        (data.data || []).forEach(b => {
          const opt = document.createElement('option');
          opt.value = b.full_name;
          opt.dataset.id = b.id;
          opt.textContent = b.full_name;
          sel.appendChild(opt);
        });
      });

    document.getElementById('supply-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const errEl = document.getElementById('form-error');
      const submitBtn = document.getElementById('submit-btn');
      errEl.style.display = 'none';

      const branchSel = document.getElementById('branch-select');
      const branch_name = branchSel.value;
      const branch_id = branchSel.options[branchSel.selectedIndex]?.dataset?.id || null;

      if (!branch_name) {
        errEl.textContent = 'Pilih cabang terlebih dahulu.';
        errEl.style.display = 'block';
        return;
      }

      submitBtn.querySelector('.btn-text').style.display = 'none';
      submitBtn.querySelector('.btn-spinner').style.display = '';
      submitBtn.disabled = true;

      const toolsRaw = form.tools_items_raw.value;
      const chemRaw = form.chemical_items_raw.value;

      const body = {
        submitter_name: form.submitter_name.value || null,
        branch_id: branch_id ? parseInt(branch_id) : null,
        branch_name,
        tools_items: toolsRaw ? toolsRaw.split('\n').map(s => s.trim()).filter(Boolean) : [],
        tools_quantity: form.tools_quantity.value || null,
        chemical_items: chemRaw ? chemRaw.split('\n').map(s => s.trim()).filter(Boolean) : [],
        chemical_quantity: form.chemical_quantity.value || null,
        additional_notes: form.additional_notes.value || null,
      };

      try {
        const res = await fetch(`${API}/api/reports/supply`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (res.ok && data.success) {
          document.getElementById('form-container').innerHTML = `
            <div class="success-banner">
              <div style="font-size:3rem">✅</div>
              <h2>Permintaan Berhasil Dikirim!</h2>
              <p>Nomor Permintaan: <strong>#${data.data.id}</strong></p>
              <p>Permintaan Anda untuk <strong>${branch_name}</strong> telah diterima dan akan segera diproses.</p>
              <br>
              <button onclick="location.reload()" class="btn btn-primary">Kirim Permintaan Lain</button>
              <a href="/" class="btn btn-ghost">Kembali ke Aplikasi</a>
            </div>
          `;
        } else {
          errEl.textContent = data.error || 'Gagal mengirim permintaan.';
          errEl.style.display = 'block';
        }
      } catch (err) {
        errEl.textContent = 'Gagal menghubungi server. Coba lagi.';
        errEl.style.display = 'block';
      } finally {
        submitBtn.querySelector('.btn-text').style.display = '';
        submitBtn.querySelector('.btn-spinner').style.display = 'none';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
